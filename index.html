<style>
  :root{
    --ink:#374151;
    --paper:#f4f6fb;
    --card:#ffffff;
    --line:#e2e8f5;
    --navy:#5b7ec7;
    --navy-dark:#4566b0;
    --blue:#7ba7e8;
    --blue-light:#eef3fd;
    --red:#e8788a;
    --red-dark:#d45c70;
    --red-light:#fff0f3;
    --surface:#f7f9fe;
    --muted:#8b96b0;
    /* compat */
    --moss:#e8788a;
    --moss-dark:#d45c70;
    --clay:#f4a56a;
    --clay-light:#fde8d4;
    --amber:#f7c96e;
    --amber-light:#fef6dc;
    --danger:#e8788a;
    --danger-light:#fde8ec;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Apple SD Gothic Neo','Malgun Gothic','Pretendard',sans-serif;
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    background:#f4f6fb;
    background-image:
      radial-gradient(800px 500px at 50% -6%, rgba(91,126,199,0.10), transparent 65%),
      radial-gradient(600px 400px at 100% 20%, rgba(232,120,138,0.06), transparent 60%),
      linear-gradient(180deg,#edf1fb 0%,#f4f6fb 40%,#fafbff 100%);
    background-attachment:fixed;
  }
  .app{max-width:960px;margin:0 auto;padding:0 0 80px;}

  /* ── HERO SLIDESHOW ── */
  .hero{
    width:100%;height:280px;position:relative;overflow:hidden;
    border-radius:0 0 28px 28px;margin-bottom:28px;
  }
  .hero-slide{
    position:absolute;inset:0;
    transform:translateX(100%);
    transition:transform 0.6s cubic-bezier(0.4,0,0.2,1);
    z-index:0;
  }
  .hero-slide.active{transform:translateX(0);z-index:1;}
  .hero-slide.prev{transform:translateX(-100%);z-index:0;}
  .hero-slide img{
    width:100%;height:100%;object-fit:cover;object-position:center 30%;display:block;
  }
  .hero-slide::after{
    content:'';position:absolute;inset:0;
    background:linear-gradient(110deg,rgba(8,14,50,0.72) 0%,rgba(8,14,50,0.38) 55%,rgba(8,14,50,0.08) 100%);
  }
  .hero-text{position:absolute;bottom:28px;left:28px;z-index:2;color:#fff;}
  .hero-text .brand{font-size:26px;font-weight:900;letter-spacing:-0.8px;text-shadow:0 2px 10px rgba(0,0,0,0.5);}
  .hero-text .sub{font-size:12.5px;opacity:0.82;margin-top:5px;text-shadow:0 1px 5px rgba(0,0,0,0.4);max-width:260px;line-height:1.5;}
  .hero-dots{
    position:absolute;bottom:14px;right:20px;z-index:3;
    display:flex;gap:5px;
  }
  .hero-dot{
    width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.4);
    cursor:pointer;transition:background .3s,transform .3s;
  }
  .hero-dot.active{background:#fff;transform:scale(1.3);}
  /* ── NAV ── */
  .app-inner{padding:0 20px;}
  .top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px;flex-wrap:wrap;gap:8px;}
  .brand{font-size:24px;font-weight:900;letter-spacing:-0.5px;}
  .brand span{color:var(--red);}
  .sub{color:var(--muted);font-size:13px;margin-bottom:22px;}
  nav{
    display:flex;gap:3px;margin-bottom:22px;flex-wrap:wrap;
    background:#fff;border:1.5px solid var(--line);border-radius:14px;padding:5px;
    box-shadow:0 3px 14px rgba(30,58,138,0.09);
  }
  nav button{
    background:none;border:none;padding:9px 18px;font-size:13.5px;font-weight:700;color:var(--muted);
    cursor:pointer;border-radius:10px;transition:background .15s,color .15s;
  }
  nav button:hover{background:var(--blue-light);color:var(--navy);}
  nav button.active{color:#fff;background:var(--navy);box-shadow:0 2px 10px rgba(30,58,138,0.30);}

  /* ── CARD ── */
  .card{
    background:#fff;border:1.5px solid var(--line);border-radius:18px;
    padding:20px 22px;margin-bottom:16px;
    box-shadow:0 4px 20px rgba(30,58,138,0.07);
  }
  .card h2{font-size:16px;margin:0 0 4px;color:var(--navy);}
  .card .desc{font-size:12.5px;color:var(--muted);margin:0 0 14px;}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}

  /* ── INPUTS ── */
  input[type=text],input[type=number],select{
    border:1.5px solid var(--line);border-radius:8px;padding:8px 10px;font-size:13.5px;
    background:var(--surface);color:var(--ink);font-family:inherit;
  }
  input:focus,select:focus{outline:2px solid var(--blue);outline-offset:1px;}
  label.f{display:flex;flex-direction:column;gap:4px;font-size:11.5px;color:var(--muted);font-weight:700;}

  /* ── BUTTONS ── */
  button.btn{
    border:none;background:var(--red);color:#fff;padding:10px 18px;
    border-radius:10px;font-size:13.5px;font-weight:700;cursor:pointer;
    box-shadow:0 3px 10px rgba(224,48,48,0.30);
    transition:transform .12s ease,box-shadow .12s ease,background .12s ease;
  }
  button.btn:hover{background:var(--red-dark);transform:translateY(-2px);box-shadow:0 5px 14px rgba(224,48,48,0.38);}
  button.btn.ghost{background:none;color:var(--navy);border:1.5px solid var(--line);box-shadow:none;}
  button.btn.ghost:hover{background:var(--blue-light);border-color:var(--blue);transform:none;}
  button.btn.danger{background:var(--danger);color:#fff;box-shadow:0 3px 8px rgba(220,38,38,0.28);}
  button.btn.danger:hover{background:#b91c1c;transform:translateY(-1px);}
  button.btn.ghost.danger{background:var(--danger);color:#fff;border-color:var(--danger);}
  button.btn.ghost.danger:hover{background:#b91c1c;border-color:#b91c1c;}
  button.btn.small{padding:5px 10px;font-size:12px;}

  /* ── TABLE ── */
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th,td{padding:8px 10px;text-align:left;border-bottom:1px solid var(--line);}
  th{color:var(--muted);font-weight:700;font-size:12px;}

  /* ── TAGS ── */
  .tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;}
  .tag.mentor{background:#fef3c7;color:#b45309;}
  .tag.mentee{background:#fed7aa;color:#9a3412;}
  .tag.normal{background:var(--surface);color:var(--muted);}
  .tag.worker{background:#e0e7ff;color:#3730a3;}
  .tag.m{background:#dbeafe;color:#1d4ed8;}
  .tag.f{background:#fce7f3;color:#9d174d;}

  /* ── PEOPLE LIST ── */
  .prow{display:grid;grid-template-columns:28px 1fr auto auto auto auto auto;align-items:center;gap:8px;padding:9px 10px;border-bottom:1px solid var(--line);font-size:13px;}
  .prow:hover{background:var(--blue-light);}
  .prow.mentee-row{background:#fffbf5;padding-left:32px;grid-template-columns:28px 1fr auto auto auto auto auto;}
  .prow.mentee-row .mentee-indent{display:inline-block;color:var(--muted);margin-right:4px;font-size:11px;}
  .prow.selected{background:#fff0f0;}
  .prow.mentor-row{border-left:3px solid var(--amber);}
  .prow.mentee-row{border-left:3px solid var(--clay);}
  .prow.worker-row{border-left:3px solid #6366f1;}
  .prow-name{font-weight:600;}
  .mentor-badge{font-size:10px;background:#fef3c7;color:#b45309;border-radius:10px;padding:1px 6px;font-weight:700;margin-left:4px;}
  .edit-row td{background:var(--blue-light);}
  .edit-row input,.edit-row select{padding:4px 6px;font-size:12px;width:auto;}
  .inline-edit{display:none;position:absolute;z-index:10;background:#fff;border:1.5px solid var(--blue);border-radius:8px;padding:4px 6px;font-size:12px;box-shadow:0 4px 12px rgba(30,58,138,0.15);}
  .editable-cell{position:relative;cursor:pointer;}
  .editable-cell:hover .edit-hint{opacity:1;}
  .edit-hint{opacity:0;font-size:10px;color:var(--blue);margin-left:3px;transition:opacity 0.15s;}

  /* ── NUKKI SELECT BTN ── */
  .nukki-select-btn{
    display:flex;flex-direction:column;align-items:center;cursor:pointer;
    user-select:none;transition:transform 0.15s;
    filter:drop-shadow(0 3px 8px rgba(30,58,138,0.22));
  }
  .nukki-select-btn:hover{transform:scale(1.08);}
  .nukki-select-btn:active{transform:scale(0.95);}
  .nukki-select-btn img{width:160px;height:auto;display:block;}
  .nukki-select-btn .sel-label{
    background:var(--navy);color:#fff;font-size:10px;font-weight:700;
    padding:2px 10px;border-radius:20px;margin-top:-8px;white-space:nowrap;
  }
  .nukki-select-btn.all-selected .sel-label{background:var(--red);}
  .nukki-deco{height:160px;width:auto;display:block;filter:drop-shadow(0 2px 8px rgba(0,0,0,0.15));margin-right:-8px;flex-shrink:0;align-self:flex-end;margin-bottom:-18px;}

  /* ── FILTER TABS ── */
  .filter-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
  .filter-tab{border:1.5px solid var(--line);background:#fff;color:var(--muted);
    padding:5px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;}
  .filter-tab.active{background:var(--navy);color:#fff;border-color:var(--navy);}
  .filter-tab[data-f="worker"].active{background:#4f46e5;border-color:#4f46e5;}

  /* ── SECTIONS ── */
  .section-label{font-size:11px;font-weight:800;color:var(--navy);padding:12px 10px 4px;letter-spacing:0.8px;text-transform:uppercase;opacity:0.65;}
  .gender-sublabel{font-size:11px;font-weight:700;color:var(--muted);padding:6px 18px 2px;opacity:0.6;}
  .section-mgr{display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
  .section-mgr-label{font-size:11px;font-weight:700;color:var(--muted);margin-right:2px;}
  .section-chip{display:inline-flex;align-items:center;gap:3px;background:var(--blue-light);border:1.5px solid #bfdbfe;border-radius:20px;padding:3px 10px 3px 12px;font-size:12px;color:var(--navy);font-weight:600;}
  .section-chip-del{background:none;border:none;cursor:pointer;color:var(--blue);font-size:12px;padding:0 0 0 2px;line-height:1;}
  .section-chip-del:hover{color:var(--red);}
  .section-add-btn{background:none;border:1.5px dashed var(--line);border-radius:20px;padding:3px 12px;font-size:12px;cursor:pointer;color:var(--muted);}
  .section-add-btn:hover{border-color:var(--blue);color:var(--navy);}
  #sectionAddForm{display:none;align-items:center;gap:6px;margin-bottom:10px;}

  /* ── AREA INLINE ── */
  .area-inline{border:1.5px solid var(--line);border-radius:7px;padding:3px 6px;font-size:13px;text-align:center;background:var(--surface);}
  .area-inline:focus{outline:none;border-color:var(--blue);}

  /* ── EMPTY / MISC ── */
  .empty{color:var(--muted);font-size:13px;padding:20px 0;text-align:center;}
  .board-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .board-title h2{margin:0;color:var(--navy);}

  /* ── AREA STEPPER ── */
  .stepper{display:inline-flex;align-items:center;gap:4px;}
  .stepper button{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--line);background:var(--surface);color:var(--navy);font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;line-height:1;transition:background .15s;}
  .stepper button:hover{background:var(--blue-light);border-color:var(--blue);}
  .stepper .val{min-width:22px;text-align:center;font-size:13px;font-weight:700;color:var(--ink);}
  .stepper input.val{border:none;background:transparent;outline:none;width:36px;padding:0;cursor:text;-moz-appearance:textfield;}
  .stepper input.val::-webkit-outer-spin-button,.stepper input.val::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
  .stepper input.val:focus{background:var(--blue-light);border-radius:4px;}
  .indoor-toggle{display:inline-flex;border-radius:8px;overflow:hidden;border:1.5px solid var(--line);font-size:12px;}
  .indoor-toggle button{padding:3px 10px;border:none;background:none;cursor:pointer;color:var(--muted);font-size:12px;font-weight:600;transition:background .15s,color .15s;}
  .indoor-toggle button.active{background:var(--navy);color:#fff;}

  /* ── SCHEDULE / ZONE ── */
  #captureArea{background:#fff;padding:24px;border-radius:18px;border:1.5px solid var(--line);box-shadow:0 4px 20px rgba(30,58,138,0.07);}
  .zone{
    border:1.5px solid var(--line);border-radius:14px;padding:15px 18px;margin-bottom:10px;
    background:linear-gradient(135deg,#f0f5ff 0%,#ffffff 100%);
    box-shadow:0 2px 8px rgba(30,58,138,0.06);
  }
  .zone-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
  .zone-name{font-weight:800;font-size:14.5px;color:var(--navy);}
  .zone-meta{font-size:11.5px;color:var(--muted);}
  .zone-people{display:flex;flex-wrap:wrap;gap:6px;}
  .chip{
    background:var(--blue-light);border:1px solid #bfdbfe;border-radius:20px;padding:5px 12px;font-size:12.5px;
    display:flex;align-items:center;gap:6px;color:var(--navy);
  }
  .chip button{border:none;background:none;color:var(--danger);cursor:pointer;font-size:13px;padding:0;line-height:1;}
  .warn-badge{background:var(--danger-light);color:var(--danger);font-size:11px;padding:2px 8px;border-radius:20px;font-weight:700;}
  .add-select{display:flex;gap:6px;margin-top:8px;}

  /* ── STATUS / HISTORY ── */
  .status-pill{padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:700;}
  .status-pill.draft{background:#fef3c7;color:#b45309;}
  .status-pill.confirmed{background:#dbeafe;color:var(--navy);}
  .history-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--line);cursor:pointer;}
  .history-item:hover{background:var(--blue-light);}
  .project-tab{background:var(--surface);border:1.5px solid var(--line);border-radius:20px;padding:4px 14px;font-size:12.5px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s;}
  .project-tab:hover{border-color:var(--blue);color:var(--navy);}
  .project-tab.active{background:var(--navy);border-color:var(--navy);color:#fff;}

  /* ── UPLOAD ── */
  .upload-box{border:2px dashed var(--line);border-radius:12px;padding:26px;text-align:center;color:var(--muted);cursor:pointer;font-size:13px;background:var(--surface);}
  .upload-box:hover{border-color:var(--blue);background:var(--blue-light);}
  .note{background:#fef3c7;color:#b45309;border-radius:10px;padding:10px 14px;font-size:12.5px;margin-bottom:12px;}

  /* ── TOAST ── */
  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:var(--navy);color:#fff;
    padding:12px 20px;border-radius:14px;font-size:13px;
    box-shadow:0 6px 24px rgba(30,58,138,0.35);z-index:50;
    display:flex;align-items:center;gap:12px;
  }
  .toast-undo{background:none;border:1.5px solid rgba(255,255,255,0.45);color:#fff;border-radius:8px;padding:4px 12px;font-size:12px;cursor:pointer;white-space:nowrap;}
  .toast-undo:hover{background:rgba(255,255,255,0.15);}

  /* ── BULK BAR ── */
  .bulk-bar{
    position:fixed;bottom:0;left:0;right:0;background:var(--navy);color:#fff;
    padding:12px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;z-index:40;
    box-shadow:0 -3px 18px rgba(30,58,138,0.28);font-size:13px;
  }
  .bulk-bar select,.bulk-bar input{font-size:12px;padding:5px 8px;border-radius:6px;border:none;color:var(--ink);}
  .bulk-bar .bulk-count{font-weight:700;margin-right:4px;}

  /* ── MISC ── */
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  @media(max-width:640px){.grid2{grid-template-columns:1fr;}}
  .month-label{font-family:'Georgia',serif;font-size:20px;font-weight:700;color:var(--navy);}
</style>
</head>

<script>
const SUPABASE_URL = 'https://pvuriqyiyghjuprewkwj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB2dXJpcXlpeWdoanVwcmV3a3dqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQzMTE1NzQsImV4cCI6MjA5OTg4NzU3NH0.Rr4YX-OcacHSsgn-dSmuW7pvSGuDouWfPVV1_p8KAb4';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const state = {
  people: [],
  areas: [],
  history: [],
  projects: [],     // 모든 초안 프로젝트
  draft: null,      // 현재 선택된 프로젝트 (projects 중 하나)
  tab: 'people',
  loaded: false,
  _selectedPeople: new Set(),
  _editingPersonId: null,
  _peopleFilter: 'all',
  _peopleSort: 'default',
  _sections: JSON.parse(localStorage.getItem('people_sections') || '["상황실","중고등","초등"]')
};
function saveSections(){ localStorage.setItem('people_sections', JSON.stringify(state._sections)); }

function dbPersonToState(p){
  return { id:p.id, name:p.name, gender:p.gender, category:p.category, team:p.team||'', level:p.level, mentorId:p.mentor_id, age:p.age||null };
}
function dbAreaToState(a){
  return { id:a.id, name:a.name, capacity:a.capacity, difficulty:a.difficulty, genderFilter:a.gender_filter||'all', fixedPeople:a.fixed_people||[], isIndoor:a.is_indoor!==false, requiredLevel:a.required_level||0, inspectorId:a.inspector_id||null, requireWorker:a.require_worker||false };
}
function dbScheduleToState(s){
  return { id:s.id, month:s.month, label:s.label||null, assignments:s.assignments||{}, status:s.status, notes:s.notes||[], createdAt: new Date(s.created_at).getTime() };
}

async function loadAll(){
  try{
    const [{data:people}, {data:areas}, {data:schedules}] = await Promise.all([
      sb.from('people').select('*').order('created_at', {ascending:true}),
      sb.from('areas').select('*').order('created_at', {ascending:true}),
      sb.from('schedules').select('*').order('created_at', {ascending:true})
    ]);
    state.people = (people||[]).map(dbPersonToState);
    state.areas = (areas||[]).map(dbAreaToState);
    const allSchedules = (schedules||[]).map(dbScheduleToState);
    state.history = allSchedules.filter(s=>s.status==='confirmed');
    state.projects = allSchedules.filter(s=>s.status==='draft');
    if(!state.draft && state.projects.length>0) state.draft = state.projects[0];
    else if(state.draft) state.draft = state.projects.find(p=>p.id===state.draft.id) || state.projects[0] || null;
  }catch(e){
    toast('Supabase 연결에 문제가 있어요.');
  }
  state.loaded = true;
  render();
}

async function addPersonDB(p){
  const {data, error} = await sb.from('people').insert({
    name:p.name, gender:p.gender, category:p.category, team:p.team, level:p.level, mentor_id:p.mentorId, age:p.age||null
  }).select().single();
  if(!error && data) p.id = data.id;
}
async function deletePersonDB(id){ await sb.from('people').delete().eq('id', id); }
async function clearMentorRefDB(mentorId){ await sb.from('people').update({mentor_id:null}).eq('mentor_id', mentorId); }
async function updatePersonDB(p){
  await sb.from('people').update({ name:p.name, gender:p.gender, category:p.category, team:p.team, level:p.level, mentor_id:p.mentorId||null, age:p.age||null }).eq('id', p.id);
}

async function addAreaDB(a){
  const {data, error} = await sb.from('areas').insert({ name:a.name, capacity:a.capacity, difficulty:a.difficulty, gender_filter:a.genderFilter||'all', fixed_people:a.fixedPeople||[], is_indoor:a.isIndoor!==false, required_level:a.requiredLevel||0, inspector_id:a.inspectorId||null }).select().single();
  if(!error && data) a.id = data.id;
}

function toast(msg, undoFn=null){
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const t = document.createElement('div');
  t.className='toast';
  const span = document.createElement('span');
  span.textContent = msg;
  t.appendChild(span);
  let timer;
  if(undoFn){
    const btn = document.createElement('button');
    btn.className='toast-undo'; btn.textContent='되돌리기';
    btn.onclick = ()=>{ clearTimeout(timer); t.remove(); undoFn(); };
    t.appendChild(btn);
    timer = setTimeout(()=>t.remove(), 5000);
  } else {
    timer = setTimeout(()=>t.remove(), 2200);
  }
  document.body.appendChild(t);
}

function initHeroSlideshow(){
  const slides = document.querySelectorAll('.hero-slide');
  const dotsEl = document.getElementById('heroDots');
  if(!slides.length || !dotsEl) return;
  // clear previous interval
  if(window._heroTimer) clearInterval(window._heroTimer);
  let cur = 0;
  // build dots
  dotsEl.innerHTML = '';
  slides.forEach((_,i)=>{
    const d = document.createElement('div');
    d.className = 'hero-dot' + (i===0?' active':'');
    d.onclick = ()=>{ goTo(i); restartTimer(); };
    dotsEl.appendChild(d);
  });
  function goTo(n){
    const prev = cur;
    cur = (n + slides.length) % slides.length;
    if(prev === cur) return;
    slides[prev].classList.remove('active');
    slides[prev].classList.add('prev');
    dotsEl.children[prev].classList.remove('active');
    slides[cur].classList.remove('prev');
    slides[cur].classList.add('active');
    dotsEl.children[cur].classList.add('active');
    setTimeout(()=>{ slides[prev].classList.remove('prev'); }, 650);
  }
  function restartTimer(){
    clearInterval(window._heroTimer);
    window._heroTimer = setInterval(()=>goTo(cur+1), 4000);
  }
  restartTimer();
}

// ---------- assignment algorithm ----------
function currentMonthLabel(){
  const now = new Date();
  return `${now.getFullYear()}년 ${now.getMonth()+1}월`;
}

function buildUnits(){
  const mentees = state.people.filter(p=>p.category==='mentee');
  const mentors = state.people.filter(p=>p.category==='mentor');
  const used = new Set();
  const units = [];
  mentors.forEach(m=>{
    const myMentees = mentees.filter(me=>me.mentorId===m.id);
    const members = [m, ...myMentees];
    members.forEach(mm=>used.add(mm.id));
    units.push({
      id: uid(),
      members,
      gender: m.gender,
      level: Math.max(...members.map(x=>x.level)),
      teams: [...new Set(members.map(x=>x.team||''))]
    });
  });
  state.people.forEach(p=>{
    if(used.has(p.id)) return;
    units.push({ id: uid(), members:[p], gender:p.gender, level:p.level, teams:[p.team||''] });
  });
  return units;
}

function lastAreaMap(){
  const confirmed = state.history.filter(h=>h.status==='confirmed');
  if(confirmed.length===0) return {};
  const last = confirmed[confirmed.length-1];
  const map = {};
  Object.entries(last.assignments).forEach(([areaId, pids])=>{
    pids.forEach(pid=> map[pid]=areaId);
  });
  return map;
}

function assignCounts(){
  const counts = {};
  state.people.forEach(p=>counts[p.id]=0);
  state.history.forEach(h=>{
    Object.values(h.assignments).flat().forEach(pid=>{ if(counts[pid]!==undefined) counts[pid]++; });
  });
  return counts;
}

function generateDraft(){
  const notes = [];
  const units = buildUnits();
  const lastMap = lastAreaMap();
  const counts = assignCounts();
  const unitScore = (u)=> u.members.reduce((s,m)=>s+ (counts[m.id]||0), 0) / u.members.length;

  const areasSorted = [...state.areas].sort((a,b)=>b.difficulty-a.difficulty);
  const assignments = {};
  state.areas.forEach(a=> assignments[a.id]=[]);

  // 점검자 배정 준비: 점검자별로 담당 구역 목록 수집
  const placedInspectors = new Set();
  // 한 사람은 한 달에 한 구역에만 배정 — 이미 배정된 인원 추적
  const assignedPeople = new Set();

  // 매 생성마다 다른 결과를 위해 초기 순서 셔플
  let remainingUnits = [...units].sort(()=>Math.random()-0.5);

  // 루프 전에 모든 구역의 고정인원을 미리 remainingUnits에서 제거
  state.areas.forEach(area=>{
    (area.fixedPeople||[]).forEach(pid=>{
      assignedPeople.add(pid);
      remainingUnits = remainingUnits.filter(u=>!u.members.some(m=>m.id===pid));
    });
  });

  // 사역자 필수 구역에 사역자 유닛 미리 예약 (일반 루프에서 소진되기 전에)
  const requireWorkerAreas = areasSorted.filter(a=>a.requireWorker);
  requireWorkerAreas.forEach(area=>{
    // 고정인원/점검자 중 이미 사역자가 있으면 건너뜀
    const alreadyHasWorker = (area.fixedPeople||[]).some(pid=>{
      const p = state.people.find(x=>x.id===pid);
      return p?.category==='worker';
    }) || (area.inspectorId && state.people.find(x=>x.id===area.inspectorId)?.category==='worker');
    if(alreadyHasWorker) return;
    const workerUnitIdx = remainingUnits.findIndex(u=>u.members.some(m=>m.category==='worker') && u.members.length <= area.capacity);
    if(workerUnitIdx !== -1){
      const wu = remainingUnits[workerUnitIdx];
      wu.members.forEach(m=>assignedPeople.add(m.id));
      // 예약만 하고 실제 배정은 루프에서 처리 — units에 reservedFor 표시
      wu._reservedFor = area.id;
    }
  });

  areasSorted.forEach(area=>{
    // 고정인원 배치
    const fixedIds = (area.fixedPeople||[]).filter(pid=> state.people.find(p=>p.id===pid));
    fixedIds.forEach(pid=>{
      if(!assignments[area.id].includes(pid)) assignments[area.id].push(pid);
    });

    // 점검자 배치: 아직 어느 구역에도 배치되지 않은 경우 이 구역에 포함
    if(area.inspectorId && !placedInspectors.has(area.inspectorId) && !assignedPeople.has(area.inspectorId)){
      if(!assignments[area.id].includes(area.inspectorId)){
        assignments[area.id].push(area.inspectorId);
      }
      assignedPeople.add(area.inspectorId);
      placedInspectors.add(area.inspectorId);
      remainingUnits = remainingUnits.filter(u=>!u.members.some(m=>m.id===area.inspectorId));
    }

    let filled = assignments[area.id].length;
    const areaGenderReq = area.genderFilter && area.genderFilter !== 'all' ? area.genderFilter : null;
    const areaReqLevel = area.requiredLevel || 0;

    // 현재 배정된 고정인원 레벨 합
    const levelSumOf = (pids) => pids.reduce((s,pid)=>{ const p=state.people.find(x=>x.id===pid); return s+(p?p.level:0); }, 0);
    let currentLevelSum = levelSumOf(assignments[area.id]);

    const hasWorker = () => assignments[area.id].some(pid=>{ const p=state.people.find(x=>x.id===pid); return p?.category==='worker'; });
    const isWorkerUnit = (u) => u.members.every(m=>m.category==='worker');
    const hasWorkerMember = (u) => u.members.some(m=>m.category==='worker');

    // 사역자 필수 구역: 예약된 사역자 유닛 또는 남은 사역자 유닛 먼저 배정
    if(area.requireWorker && !hasWorker() && filled < area.capacity){
      const reservedIdx = remainingUnits.findIndex(u=>u._reservedFor===area.id);
      const workerUnitIdx = reservedIdx !== -1 ? reservedIdx
        : remainingUnits.findIndex(u=>hasWorkerMember(u) && u.members.length <= area.capacity - filled);
      if(workerUnitIdx !== -1){
        const wu = remainingUnits[workerUnitIdx];
        assignments[area.id].push(...wu.members.map(m=>m.id));
        wu.members.forEach(m=>assignedPeople.add(m.id));
        currentLevelSum += wu.members.reduce((s,m)=>s+m.level,0);
        filled += wu.members.length;
        remainingUnits.splice(workerUnitIdx,1);
      }
    }
    const teamsInArea = () => new Set(assignments[area.id].map(pid=>state.people.find(p=>p.id===pid)?.team||''));

    // 팀 밸런스 점수: 초등/중고등 팀이 구역에 없으면 해당 팀 유닛 최우선
    const TARGET_TEAMS = ['중고등', '초등'];
    const teamDiversityScore = (u) => {
      const present = teamsInArea();
      const missingTargets = TARGET_TEAMS.filter(t => !present.has(t));
      const unitTeams = new Set(u.members.map(m => m.team || ''));
      if(missingTargets.some(t => unitTeams.has(t))) return -2; // 없는 핵심 팀을 채움
      if(u.members.some(m => !present.has(m.team || ''))) return -1; // 새 팀 추가
      return 0;
    };

    // 배정 때마다 남은 레벨 필요량 / 남은 인원수로 목표 레벨을 재계산해 가장 근접한 유닛 선택
    // 팀 밸런스(초등·중고등 혼합) 1순위, 레벨 초과 방지 2순위, 레벨 근접도 3순위
    const sortByBalance = () => {
      const remainingSlots = area.capacity - filled;
      if(areaReqLevel > 0 && remainingSlots > 0){
        const targetLevel = Math.max(0, areaReqLevel - currentLevelSum) / remainingSlots;
        const wouldOvershoot = (u) => currentLevelSum + u.members.reduce((s,m)=>s+m.level,0) > areaReqLevel ? 1 : 0;
        remainingUnits.sort((a,b)=>
          (teamDiversityScore(a) - teamDiversityScore(b)) ||
          (wouldOvershoot(a) - wouldOvershoot(b)) ||
          (Math.abs(a.level - targetLevel) - Math.abs(b.level - targetLevel))
        );
      } else {
        remainingUnits.sort((a,b)=>
          (teamDiversityScore(a) - teamDiversityScore(b)) ||
          (unitScore(a) - unitScore(b))
        );
      }
    };

    // 비사역자 기준 구역 내 성별 고정 (사역자는 무관)
    const nonWorkerGender = () => {
      for(const pid of assignments[area.id]){
        const p = state.people.find(x=>x.id===pid);
        if(p && p.category!=='worker') return p.gender;
      }
      return null;
    };
    const genderMixOk = (u) => {
      // 구역에 성별 필터가 있으면 사역자 포함 모든 멤버에 적용
      if(areaGenderReq) return u.members.every(m=>m.gender===areaGenderReq);
      // 성별 필터 없으면 비사역자끼리 성별 통일
      const nonWorkers = u.members.filter(m=>m.category!=='worker');
      if(nonWorkers.length===0) return true;
      const areaGender = nonWorkerGender();
      if(areaGender===null) return true;
      return nonWorkers.every(m=>m.gender===areaGender);
    };

    let i=0;
    while(filled < area.capacity && i < remainingUnits.length){
      sortByBalance();
      const u = remainingUnits[i];
      const size = u.members.length;
      if(filled + size > area.capacity){ i++; continue; }
      // 다른 구역에 예약된 사역자 유닛은 건너뜀
      if(u._reservedFor && u._reservedFor !== area.id){ i++; continue; }
      const genderOk = (areaGenderReq===null || u.members.every(m=>m.gender===areaGenderReq)) && genderMixOk(u);
      const noRepeat = u.members.every(m=> lastMap[m.id] !== area.id);
      const workerOk = !isWorkerUnit(u) || !hasWorker();
      if(genderOk && noRepeat && workerOk){
        assignments[area.id].push(...u.members.map(m=>m.id));
        u.members.forEach(m=>assignedPeople.add(m.id));
        currentLevelSum += u.members.reduce((s,m)=>s+m.level,0);
        filled += size;
        remainingUnits.splice(i,1);
        i = 0;
      } else {
        i++;
      }
    }
    if(filled < area.capacity){
      // 반복 배정 금지 완화
      i=0;
      while(filled < area.capacity && i < remainingUnits.length){
        const u = remainingUnits[i];
        const size = u.members.length;
        if(filled + size > area.capacity){ i++; continue; }
        if(u._reservedFor && u._reservedFor !== area.id){ i++; continue; }
        const genderOk = (areaGenderReq===null || u.members.every(m=>m.gender===areaGenderReq)) && genderMixOk(u);
        const workerOk = !isWorkerUnit(u) || !hasWorker();
        if(genderOk && workerOk){
          assignments[area.id].push(...u.members.map(m=>m.id));
          u.members.forEach(m=>assignedPeople.add(m.id));
          currentLevelSum += u.members.reduce((s,m)=>s+m.level,0);
          filled += size;
          remainingUnits.splice(i,1);
          notes.push(`"${area.name}" 배정 시 연속 배정 금지 조건을 완화했어요. 확인해주세요.`);
        } else { i++; }
      }
    }
    if(filled < area.capacity){
      notes.push(`"${area.name}"에 인원이 부족해요 (${filled}/${area.capacity}명). 직접 채워주세요.`);
    }
    if(areaReqLevel > 0 && currentLevelSum < areaReqLevel){
      notes.push(`"${area.name}" 배정 레벨 합계(${currentLevelSum})가 목표(${areaReqLevel})에 미치지 못해요. 직접 조정해주세요.`);
    }
  });

  if(remainingUnits.length>0){
    notes.push(`미배정 인원이 있어요. 구역별 정원을 확인하거나 직접 배정해주세요.`);
  }

  return {
    id: uid(),
    month: currentMonthLabel(),
    assignments,
    status: 'draft',
    notes,
    createdAt: Date.now()
  };
}

        else state._selectedPeople.delete(id);
        render();

      span.onclick = (e)=>{

        const id = span.dataset.editName;

        if(!person) return;
        const inp = document.createElement('input');
        inp.value = person.name;
        inp.style.cssText = 'font-size:13px;font-weight:600;border:1px solid var(--blue);border-radius:4px;padding:1px 6px;width:80px;outline:none;';
        span.replaceWith(inp);
        inp.focus(); inp.select();
        const save = async ()=>{
          const val = inp.value.trim();
          if(val && val !== person.name){
            person.name = val;
            await updatePersonDB(person);
            toast(`이름을 "${val}"로 변경했어요.`);
          }
          render();
        };
        inp.onblur = save;
        inp.onkeydown = e=>{ if(e.key==='Enter') inp.blur(); if(e.key==='Escape'){ inp.value=person.name; inp.blur(); } };
      };
    });

    document.querySelectorAll('.filter-tab').forEach(btn=>{
      btn.onclick = ()=>{ state._peopleFilter = btn.dataset.f; render(); };

      btn.onclick = ()=>{ state._peopleSort = btn.dataset.peopleSort; render(); };
    });

        saveSections();
        if(state._peopleFilter===s) state._peopleFilter='all';
        render();
      };

      state._sections.push(name);
      saveSections();
      render();
    };

    document.getElementById('sectionCancelBtn').onclick = ()=>{ sectionAddForm.style.display='none'; };

    if(nukkiFab) nukkiFab.onclick = ()=>{
      const allChecked = state.people.every(p=>state._selectedPeople.has(p.id));
      if(allChecked) state._selectedPeople.clear();
      else state.people.forEach(p=>state._selectedPeople.add(p.id));
      render();
    };

    document.querySelectorAll('.editable-cell').forEach(cell=>{
      cell.onclick = (e)=>{
        e.stopPropagation();
        const type = cell.dataset.toggle;
        const id = cell.dataset.id;
        const p = state.people.find(x=>x.id===id);
        if(!p) return;
        // 기존 팝업 제거

        const pop = document.createElement('div');

        if(type==='gender'){
          pop.innerHTML = `<div style="font-size:11px;color:var(--muted);margin-bottom:4px;">성별</div>
            <div style="display:flex;gap:6px;">
              <button class="btn small ${p.gender==='m'?'':'ghost'}" data-val="m">남</button>
              <button class="btn small ${p.gender==='f'?'':'ghost'}" data-val="f">여</button>
            </div>`;
          pop.querySelectorAll('button').forEach(b=>b.onclick=async()=>{
            p.gender=b.dataset.val; await updatePersonDB(p); pop.remove(); render();
          });
        } else if(type==='category'){
          pop.innerHTML = `<div style="font-size:11px;color:var(--muted);margin-bottom:4px;">카테고리</div>
            <div style="display:flex;flex-direction:column;gap:4px;">
              ${['normal','mentor','mentee','worker'].map(v=>`<button class="btn small ${p.category===v?'':'ghost'}" data-val="${v}">${catLabel(v)}</button>`).join('')}
            </div>`;
          pop.querySelectorAll('button').forEach(b=>b.onclick=async()=>{
            p.category=b.dataset.val; await updatePersonDB(p); pop.remove(); render();
          });
        } else if(type==='team'){
          pop.innerHTML = `<div style="font-size:11px;color:var(--muted);margin-bottom:4px;">팀</div>
            <input type="text" value="${p.team||''}" placeholder="팀명" style="width:100px;font-size:13px;padding:5px 7px;border:1px solid var(--line);border-radius:5px;">
            <button class="btn small" style="margin-top:6px;width:100%;">저장</button>`;
          const inp = pop.querySelector('input');
          pop.querySelector('button').onclick = async()=>{
            p.team=inp.value.trim(); await updatePersonDB(p); pop.remove(); render();
          };
          setTimeout(()=>inp.focus(),50);
        } else if(type==='level'){
          pop.innerHTML = `<div style="font-size:11px;color:var(--muted);margin-bottom:4px;">레벨</div>
            <div style="display:flex;gap:4px;">
              ${[1,2,3,4,5].map(n=>`<button class="btn small ${p.level===n?'':'ghost'}" data-val="${n}">${n}</button>`).join('')}
            </div>`;
          pop.querySelectorAll('button').forEach(b=>b.onclick=async()=>{
            p.level=parseInt(b.dataset.val); await updatePersonDB(p); pop.remove(); render();
          });
        } else if(type==='age'){
          pop.innerHTML = `<div style="font-size:11px;color:var(--muted);margin-bottom:4px;">나이</div>
            <input type="number" value="${p.age||''}" placeholder="나이" min="1" max="120" style="width:80px;font-size:13px;padding:5px 7px;border:1px solid var(--line);border-radius:5px;">
            <button class="btn small" style="margin-top:6px;width:100%;">저장</button>`;
          const inp = pop.querySelector('input');
          pop.querySelector('button').onclick = async()=>{
            p.age = inp.value ? parseInt(inp.value) : null; await updatePersonDB(p); pop.remove(); render();
          };
          setTimeout(()=>inp.focus(),50);
        }
        cell.style.position='relative';
        cell.appendChild(pop);
        const close = (ev)=>{ if(!pop.contains(ev.target)&&ev.target!==cell){ pop.remove(); document.removeEventListener('click',close); }};
        setTimeout(()=>document.addEventListener('click',close),100);
      };
    });

    // 멘토 → 멘티 연결 select
    document.querySelectorAll('[data-assign-mentee-to]').forEach(sel=>{
      sel.onchange = async ()=>{
        const mentorId = sel.dataset.assignMenteeTo;
        const menteeId = sel.value;
        if(!menteeId) return;
        const mentee = state.people.find(p=>String(p.id)===String(menteeId));
        if(!mentee) return;
        mentee.mentorId = mentorId;
        await updatePersonDB(mentee);
        render();
        toast(`${mentee.name}을(를) 멘티로 연결했어요.`);
      };
    });

    // 담당 멘토 인라인 select
    document.querySelectorAll('[data-inline-mentor]').forEach(sel=>{
      sel.onchange = async()=>{
        const p = state.people.find(x=>x.id===sel.dataset.inlineMentor);
        if(!p) return;
        p.mentorId = sel.value || null;
        await updatePersonDB(p);
        render();
        toast('멘토를 변경했어요.');
      };
    });

    // 삭제
    document.querySelectorAll('[data-del-person]').forEach(b=>{
      b.onclick = async (e)=>{
        e.stopPropagation();
        const rawId = b.dataset.delPerson;
        const id = isNaN(rawId) ? rawId : Number(rawId);
        const deleted = state.people.find(p=>p.id==rawId);
        await deletePersonDB(id);
        await clearMentorRefDB(id);
        state.people = state.people.filter(p=>p.id!=rawId);
        state.people.forEach(p=>{ if(p.mentorId==rawId) p.mentorId=null; });
        state._selectedPeople.forEach(sid=>{ if(String(sid)===rawId) state._selectedPeople.delete(sid); });
        render();
        if(deleted) toast(`${deleted.name}을(를) 삭제했어요.`, async ()=>{
          const restored = {...deleted, id:undefined};
          await addPersonDB(restored);
          state.people.push(restored);
          render();
          toast(`${deleted.name}을(를) 복원했어요.`);
        });
      };
    });

    // 일괄 수정
    const bulkApplyBtn = document.getElementById('bulkApplyBtn');
    if(bulkApplyBtn){
      bulkApplyBtn.onclick = async()=>{
        const gender = document.getElementById('bulk_gender').value;
        const category = document.getElementById('bulk_category').value;
        const team = document.getElementById('bulk_team').value.trim();
        const levelRaw = document.getElementById('bulk_level').value;
        const level = levelRaw ? parseInt(levelRaw) : null;
        const ageRaw = document.getElementById('bulk_age').value;
        const age = ageRaw ? parseInt(ageRaw) : null;
        const targets = state.people.filter(p=>state._selectedPeople.has(p.id));
        for(const p of targets){
          if(gender) p.gender=gender;
          if(category) p.category=category;
          if(team) p.team=team;
          if(level) p.level=level;
          if(age) p.age=age;
          await updatePersonDB(p);
        }
        state._selectedPeople.clear();
        render();
        toast(`${targets.length}명을 수정했어요.`);
      };
      document.getElementById('bulkCancelBtn').onclick=()=>{ state._selectedPeople.clear(); render(); };
      document.getElementById('bulkDeleteBtn').onclick = async()=>{
        const targets = state.people.filter(p=>state._selectedPeople.has(p.id));
        if(!confirm(`선택한 ${targets.length}명을 삭제할까요?`)) return;
        const snapshot = targets.map(p=>({...p}));
        for(const p of targets){
          await sb.from('people').delete().eq('id',p.id);
          state.people = state.people.filter(x=>x.id!==p.id);
        }
        state._selectedPeople.clear();
        render();
        toast(`${targets.length}명을 삭제했어요.`, async ()=>{
          for(const p of snapshot){
            const restored = {...p, id:undefined};
            await addPersonDB(restored);

          render();
          toast(`${snapshot.length}명을 복원했어요.`);

    }

    const uploadBox = document.getElementById('uploadBox');

    uploadBox.ondrop = (e)=>{ e.preventDefault(); if(e.dataTransfer.files[0]) handleRosterImage(e.dataTransfer.files[0]); };

  }

  // areas tab
  const addAreaBtn = document.getElementById('addAreaBtn');
  if(addAreaBtn){
    addAreaBtn.onclick = async ()=>{
      const name = document.getElementById('a_name').value.trim();
      if(!name){ toast('구역명을 입력해주세요.'); return; }
      const capacity = parseInt(document.getElementById('a_capacity').value)||1;
      const difficulty = 1;
      const genderFilter = document.getElementById('a_gender').value||'all';
      const isIndoor = document.getElementById('a_indoor').value !== 'false';
      const requiredLevel = parseInt(document.getElementById('a_required_level').value)||0;
      const area = { name, capacity, difficulty, genderFilter, fixedPeople:[], isIndoor, requiredLevel };
      await addAreaDB(area);
      state.areas.push(area);
      render();
      toast('구역을 추가했어요.');
    };
    document.querySelectorAll('[data-del-area]').forEach(b=>{
      b.onclick = async ()=>{
        await deleteAreaDB(b.dataset.delArea);
        state.areas = state.areas.filter(a=>a.id!==b.dataset.delArea);
        render();
      };
    });

    // 고정인원 해제
    document.querySelectorAll('[data-unfix-person]').forEach(b=>{
      b.onclick = async ()=>{
        const [areaId, pid] = b.dataset.unfixPerson.split('|');
        const area = state.areas.find(a=>String(a.id)===String(areaId));
        if(!area) return;
        area.fixedPeople = (area.fixedPeople||[]).filter(id=>String(id)!==String(pid));
        await updateAreaDB(area);
        render();
        toast('고정인원을 해제했어요.');
      };
    });

    // 스테퍼 (+/-)
    document.querySelectorAll('[data-step-area]').forEach(b=>{
      b.onclick = async ()=>{
        const id = b.dataset.stepArea;
        const field = b.dataset.stepField;
        const dir = parseInt(b.dataset.stepDir);
        const area = state.areas.find(a=>String(a.id)===String(id));
        if(!area) return;
        const min = field==='requiredLevel' ? 0 : 1;
        const max = field==='difficulty' ? 5 : 99;
        const newVal = Math.min(max, Math.max(min, (area[field]||1) + dir));
        area[field] = newVal;
        await updateAreaDB(area);
        render();
      };
    });

    // 구역 이름 인라인 수정
    document.querySelectorAll('[data-edit-area-name]').forEach(span=>{
      span.onclick = ()=>{
        const id = span.dataset.editAreaName;
        const area = state.areas.find(a=>String(a.id)===String(id));
        if(!area) return;
        const inp = document.createElement('input');
        inp.value = area.name;
        inp.style.cssText = 'font-size:13px;font-weight:600;border:1px solid var(--blue);border-radius:4px;padding:1px 6px;width:90px;outline:none;';
        span.replaceWith(inp);
        inp.focus(); inp.select();
        const save = async ()=>{
          const val = inp.value.trim();
          if(val && val !== area.name){
            area.name = val;
            await updateAreaDB(area);
            toast(`구역명을 "${val}"로 변경했어요.`);
          }
          render();
        };
        inp.onblur = save;
        inp.onkeydown = e=>{ if(e.key==='Enter') inp.blur(); if(e.key==='Escape'){ inp.value=area.name; inp.blur(); } };
      };
    });

    // 스테퍼 직접 입력
    document.querySelectorAll('[data-stepper-input]').forEach(inp=>{
      const save = async ()=>{
        const id = inp.dataset.stepArea;
        const field = inp.dataset.stepField;
        const area = state.areas.find(a=>String(a.id)===String(id));
        if(!area) return;
        const min = field==='requiredLevel' ? 0 : 1;
        const max = 999;
        const val = Math.min(max, Math.max(min, parseInt(inp.value)||0));
        if(area[field]===val) return;
        area[field] = val;
        await updateAreaDB(area);
        render();
      };
      inp.onblur = save;
      inp.onkeydown = e=>{
        if(e.key==='Enter'){ inp.blur(); return; }
        if(!/[0-9]|Backspace|Delete|ArrowLeft|ArrowRight|Tab/.test(e.key)) e.preventDefault();
      };
    });

    // 난이도 토글
    document.querySelectorAll('[data-diff-area]').forEach(b=>{
      b.onclick = async ()=>{
        const id = b.dataset.diffArea;
        const val = parseInt(b.dataset.diffVal);
        const area = state.areas.find(a=>String(a.id)===String(id));
        if(!area) return;
        area.difficulty = val;
        await updateAreaDB(area);
        render();
      };
    });

    // 야외/실내 토글
    document.querySelectorAll('[data-indoor-area]').forEach(b=>{
      b.onclick = async ()=>{
        const id = b.dataset.indoorArea;
        const val = b.dataset.indoorVal === 'true';
        const area = state.areas.find(a=>String(a.id)===String(id));
        if(!area) return;
        area.isIndoor = val;
        await updateAreaDB(area);
        render();
      };
    });

    document.querySelectorAll('[data-require-worker]').forEach(b=>{
      b.onclick = async ()=>{
        const area = state.areas.find(a=>String(a.id)===String(b.dataset.requireWorker));
        if(!area) return;
        area.requireWorker = !area.requireWorker;
        await updateAreaDB(area);
        toast(`${area.name} 사역자 ${area.requireWorker?'필수':'선택'}으로 변경했어요.`);
        render();
      };
    });

    // 구역 인라인 편집 (성별 / 고정인원)
    document.querySelectorAll('.area-inline').forEach(input=>{
      input.onchange = async ()=>{
        const id = input.dataset.areaId;
        const field = input.dataset.areaField;
        const area = state.areas.find(a=>String(a.id)===String(id));
        if(!area) return;
        if(field==='fixedAdd'){
          const pid = input.value;
          if(!pid) return;
          area.fixedPeople = [...(area.fixedPeople||[]), pid];
          await updateAreaDB(area);
          render();
          toast(`고정인원을 추가했어요.`);
          return;
        }
        if(field==='genderFilter'){
          area.genderFilter = input.value;
          await updateAreaDB(area);
          render();
          toast(`${area.name} 성별을 변경했어요.`);
          return;
        }
        if(field==='inspectorId'){
          area.inspectorId = input.value || null;
          await updateAreaDB(area);
          const name = input.value ? state.people.find(p=>p.id===input.value)?.name : '없음';
          toast(`${area.name} 점검자를 ${name}으로 설정했어요.`);
          return;
        }
        const val = parseInt(input.value);
        if(isNaN(val)||val<1) return;
        area[field] = val;
        await updateAreaDB(area);
        toast(`${area.name} ${field==='difficulty'?'난이도':'필요 인원'}을 ${val}로 변경했어요.`);
      };
    });
  }

  // generate tab — 프로젝트 탭 전환
  document.querySelectorAll('[data-project-id]').forEach(btn=>{
    btn.onclick = ()=>{
      state.draft = state.projects.find(p=>p.id===btn.dataset.projectId) || null;
      render();
    };
  });

  // 새 프로젝트 버튼
  const newProjectBtn = document.getElementById('newProjectBtn');
  if(newProjectBtn){
    newProjectBtn.onclick = ()=>{
      const form = document.getElementById('newProjectForm');
      if(form) { form.style.display = form.style.display==='none'?'flex':'none'; }
    };
  }
  const newProjectCancelBtn = document.getElementById('newProjectCancelBtn');
  if(newProjectCancelBtn){
    newProjectCancelBtn.onclick = ()=>{ document.getElementById('newProjectForm').style.display='none'; };
  }
  const newProjectConfirmBtn = document.getElementById('newProjectConfirmBtn');
  if(newProjectConfirmBtn){
    newProjectConfirmBtn.onclick = async ()=>{
      const name = document.getElementById('newProjectName').value.trim();
      const month = document.getElementById('newProjectMonth').value;
      if(!name){ toast('프로젝트 이름을 입력해주세요.'); return; }
      const draft = { month, label:name, assignments:{}, notes:[], status:'draft' };
      // 빈 구역 배정 초기화
      state.areas.forEach(a=>{ draft.assignments[a.id]=[]; });
      await createDraftDB(draft);
      state.projects.push(draft);
      state.draft = draft;
      render();
      toast(`"${name}" 프로젝트를 만들었어요.`);
    };
  }

  const genBtn = document.getElementById('genDraftBtn');
  if(genBtn){
    genBtn.onclick = async ()=>{
      const draft = generateDraft();
      // 현재 활성 프로젝트에 덮어쓰기 vs 새로 생성
      if(state.draft){
        await deleteDraftDB(state.draft.id);
        state.projects = state.projects.filter(p=>p.id!==state.draft.id);
      }
      draft.label = state.draft?.label || null;
      await createDraftDB(draft);
      state.projects.push(draft);
      state.draft = draft;
      render();
    };
  }
  const regenBtn = document.getElementById('regenBtn');
  if(regenBtn){
    regenBtn.onclick = async ()=>{
      await deleteDraftDB(state.draft.id);
      const oldLabel = state.draft.label;
      state.projects = state.projects.filter(p=>p.id!==state.draft.id);
      const draft = generateDraft();
      draft.label = oldLabel;
      await createDraftDB(draft);
      state.projects.push(draft);
      state.draft = draft;
      render();
    };
  }
  const confirmBtn = document.getElementById('confirmBtn');
  if(confirmBtn){
    confirmBtn.onclick = async ()=>{
      await confirmDraftDB();
      state.draft.status='confirmed';
      state.history.push(state.draft);
      state.projects = state.projects.filter(p=>p.id!==state.draft.id);
      state.draft = state.projects[0] || null;
      render();
      toast('배정표를 확정했어요.');
    };
  }
  document.querySelectorAll('[data-remove-assign]').forEach(b=>{
    b.onclick = async ()=>{
      const [areaId, pid] = b.dataset.removeAssign.split('|');
      state.draft.assignments[areaId] = state.draft.assignments[areaId].filter(id=>id!==pid);
      await updateDraftDB();
      render();
    };
  });
  document.querySelectorAll('[data-add-to]').forEach(sel=>{
    sel.onchange = async ()=>{
      const areaId = sel.dataset.addTo;
      const pid = sel.value;
      if(!pid) return;
      state.draft.assignments[areaId].push(pid);
      await updateDraftDB();
      render();
    };
  });
  const deleteProjectBtn = document.getElementById('deleteProjectBtn');
  if(deleteProjectBtn){
    deleteProjectBtn.onclick = async ()=>{
      if(!confirm(`"${state.draft.label||state.draft.month}" 프로젝트를 삭제할까요?`)) return;
      await deleteDraftDB(state.draft.id);
      state.projects = state.projects.filter(p=>p.id!==state.draft.id);
      state.draft = state.projects[0] || null;
      render();
      toast('프로젝트를 삭제했어요.');
    };
  }
  const exportBtn = document.getElementById('exportImgBtn');
  if(exportBtn){
    exportBtn.onclick = ()=> exportBoardImage();
  }

  // history tab
  document.querySelectorAll('[data-view-history]').forEach(item=>{
    item.onclick = ()=>{
      const h = state.history.find(x=>x.id===item.dataset.viewHistory);
      document.getElementById('historyDetail').innerHTML = renderDraftBoard(h, false);
      bindEvents();
      document.getElementById('historyDetail').scrollIntoView({behavior:'smooth'});
    };
  });
}

async function exportBoardImage(){
  if(!state.draft) return;
  toast('이미지 생성 중...');

  const entry = state.draft;
  const areas = state.areas;
  const people = state.people;
  const assignments = entry.assignments || {};

  // 구역별 데이터 준비
  const rows = areas.map(area=>{
    const pids = assignments[area.id] || [];
    const members = pids.map(pid=>people.find(p=>p.id===pid)).filter(Boolean);
    const workers = members.filter(m=>m.category==='worker');
    const nonWorkers = members.filter(m=>m.category!=='worker');
    // 점검자: 해당 구역에 배정된 사역자 (첫 번째)
    const inspector = workers[0] || null;
    return { area, members, nonWorkers, workers, inspector };
  });

  const titleText = document.getElementById('exportTitle')?.value || `${entry.month} 본부 건물 청소당번표`;

  // 누끼 이미지 — base64로 변환해서 html2canvas taint 우회
  const nukkiFiles = ['주님한분5-Photoroom.png','DSC02220-Photoroom.png','IMG_7110-Photoroom.png','S3_01057-Photoroom.png'];
  const nukkiSrc = './images/누끼/' + nukkiFiles[Math.floor(Math.random()*nukkiFiles.length)];
  const nukkiB64 = await fetch(nukkiSrc).then(r=>r.blob()).then(blob=>new Promise(res=>{
    const reader = new FileReader();
    reader.onload = ()=>res(reader.result);
    reader.onerror = ()=>res('');
    reader.readAsDataURL(blob);
  })).catch(()=>'');

  // 한 사람 이름 HTML (팀별 색상)
  const nameHtml = (p) => {
    const color = p.team==='초등' ? '#f97316' : p.team==='선교한국' ? '#3b82f6' : '#1f2937';
    const bold = p.team==='초등' || p.team==='선교한국';
    return `<span style="color:${color};font-weight:${bold?'700':'400'}">${p.name}</span>`;
  };

  const assigneeHtml = (row) => {
    const parts = row.nonWorkers.map(nameHtml);
    if(row.workers.length > 0) parts.push('<span style="color:#9ca3af"> / </span>' + row.workers.map(p=>`<span style="color:#6b7280">${p.name}</span>`).join(' '));
    return parts.join(' ') || '-';
  };

  const half = Math.ceil(rows.length / 2);
  const left = rows.slice(0, half);
  const right = rows.slice(half);

  // 귀여운 파스텔 팔레트
  const ACCENT   = '#7c6ff7';
  const HEADER_BG= '#ede9fe';
  const HEADER_TX= '#4c1d95';
  const STRIPE   = '#faf8ff';
  const BORDER   = '#ddd6fe';
  const BG       = '#ffffff';

  const makeRows = (list) => list.map((row, i) => {
    const bg = i % 2 === 1 ? STRIPE : '#fff';
    const base = `padding:8px 13px;font-size:12.5px;vertical-align:middle;border-bottom:1px solid ${BORDER};background:${bg};`;
    const areaC = base + `text-align:center;color:#374151;max-width:95px;word-break:keep-all;line-height:1.5;font-weight:500;`;
    const nameC = base + `text-align:left;`;
    const inspC = base + `text-align:center;color:${ACCENT};font-weight:700;font-size:12px;`;
    return `<tr>
      <td style="${areaC}">${row.area.name}</td>
      <td style="${nameC}">${assigneeHtml(row)}</td>
      <td style="${inspC}">${row.inspector ? row.inspector.name : ''}</td>
    </tr>`;
  }).join('');

  const thStyle = `background:#ede9fe;color:#4c1d95;font-weight:800;font-size:12.5px;padding:9px 13px;text-align:center;letter-spacing:0.04em;border-bottom:2px solid ${ACCENT};`;
  const makeTable = (list) => `
    <table style="border-collapse:collapse;flex:1;border-radius:14px;overflow:hidden;border:1.5px solid ${BORDER};box-shadow:0 2px 12px rgba(109,40,217,0.08);background:#fff;">
      <thead><tr>
        <th style="${thStyle}min-width:85px;">청소구역</th>
        <th style="${thStyle}">담당자</th>
        <th style="${thStyle}min-width:62px;">점검자</th>
      </tr></thead>
      <tbody>${makeRows(list)}</tbody>
    </table>`;

  const nukkiTag = nukkiB64
    ? `<img src="${nukkiB64}" style="height:190px;object-fit:contain;display:block;position:absolute;right:24px;bottom:0;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.18));" />`
    : '';

  const html = `
  <div style="font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#f5f3ff;padding:0;display:inline-block;min-width:1000px;border-radius:20px;overflow:hidden;box-shadow:0 8px 40px rgba(109,40,217,0.13);">
    <!-- 헤더 배너 -->
    <div style="position:relative;background:linear-gradient(120deg,#6d28d9 0%,#8b5cf6 55%,#a78bfa 100%);padding:22px 28px 18px;min-height:90px;">
      <!-- 배경 원 장식 -->
      <div style="position:absolute;right:-30px;top:-40px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,0.08);"></div>
      <div style="position:absolute;right:120px;top:-20px;width:90px;height:90px;border-radius:50%;background:rgba(255,255,255,0.07);"></div>
      <div style="position:absolute;left:-20px;bottom:-30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,0.06);"></div>
      <!-- 제목 -->
      <div style="position:relative;z-index:2;padding-right:200px;">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">
          <span style="display:inline-block;width:4px;height:28px;background:#fde68a;border-radius:2px;"></span>
          <h1 style="font-size:28px;font-weight:900;color:#ffffff;margin:0;letter-spacing:-0.01em;text-shadow:0 2px 8px rgba(0,0,0,0.18);">${titleText}</h1>
        </div>
        <div style="display:flex;align-items:center;gap:6px;padding-left:14px;">
          <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.5);"></span>
          <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:#fde68a;"></span>
          <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.5);"></span>
        </div>
      </div>
      <!-- 누끼 -->
      ${nukkiTag}
    </div>
    <!-- 표 영역 -->
    <div style="padding:16px 20px 20px;display:flex;gap:14px;align-items:flex-start;">
      ${makeTable(left)}
      ${makeTable(right)}
    </div>
  </div>`;

  const wrapper = document.createElement('div');
  wrapper.style.cssText = 'position:fixed;left:-9999px;top:0;background:#fff;';
  wrapper.innerHTML = html;
  document.body.appendChild(wrapper);

  html2canvas(wrapper.firstElementChild, { backgroundColor:'#ffffff', scale:2, useCORS:true }).then(canvas=>{
    document.body.removeChild(wrapper);
    const link = document.createElement('a');
    link.download = `청소당번표_${entry.month.replace(/\s/g,'')}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  });
}

// ---------- 통합 이미지 분석 (구역 + 인원 동시 추출) ----------
async function handleRosterImage(file){
  const statusEl = document.getElementById('uploadStatus');
  const previewEl = document.getElementById('importPreview');
  statusEl.textContent = '이미지를 분석하는 중...';
  if(previewEl) previewEl.innerHTML = '';
  try{
    const base64 = await new Promise((res,rej)=>{
      const r = new FileReader();
      r.onload = ()=> res(r.result.split(',')[1]);
      r.onerror = rej;
      r.readAsDataURL(file);
    });
    const mediaType = file.type || 'image/png';
    const response = await fetch('https://pvuriqyiyghjuprewkwj.supabase.co/functions/v1/analyze-image', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ base64, mediaType, mode:'auto' })
    });
    const data = await response.json();

    // ── 청소당번표 형식 ──────────────────────────────────────
    if(data.type === 'schedule' || (Array.isArray(data.rows) && data.rows.length > 0)){
      const rows = data.rows || [];
      const title = data.title || '';
      statusEl.innerHTML = `<strong>청소 당번표 추출 완료!</strong> ${rows.length}개 구역`;
      if(!previewEl) return;
      const tableRows = rows.map(r=>`
        <tr>
          <td style="font-weight:600">${r.area||''}</td>
          <td>${(r.assignees||[]).join(', ')}</td>
          <td style="color:var(--navy)">${r.inspector||'-'}</td>
        </tr>`).join('');
      const cancelBtn = `<button class="btn ghost small" id="cancelImportBtn" style="margin-bottom:10px;">✕ 취소하기</button>`;
      previewEl.innerHTML = `${cancelBtn}
        <div class="card" style="padding:16px;">
          ${title ? `<h2 style="margin-bottom:12px;">${title}</h2>` : ''}
          <div style="overflow-x:auto;">
          <table>
            <thead><tr><th>청소구역</th><th>담당자</th><th>점검자</th></tr></thead>
            <tbody>${tableRows}</tbody>
          </table>
          </div>
          <div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;">
            <button class="btn" id="saveScheduleBtn">배정표로 저장하기</button>
            <button class="btn ghost small" id="extractPeopleFromScheduleBtn">인원만 명단에 추가</button>
          </div>
        </div>`;
      document.getElementById('cancelImportBtn').onclick = ()=>{ previewEl.innerHTML=''; statusEl.textContent=''; };

      // 배정표로 저장
      document.getElementById('saveScheduleBtn').onclick = async ()=>{
        const btn = document.getElementById('saveScheduleBtn');
        btn.disabled = true; btn.textContent = '저장 중...';
        // 구역 매칭 & 배정 맵 생성
        const assignments = {};
        for(const r of rows){
          let area = state.areas.find(a=>a.name===r.area);
          if(!area){
            const newArea = {name:r.area, capacity:(r.assignees||[]).length||1, difficulty:1, genderFilter:'all', fixedPeople:[]};
            await addAreaDB(newArea); state.areas.push(newArea); area = newArea;
          }
          const pids = (r.assignees||[]).map(name=>{
            const p = state.people.find(x=>x.name===name);
            return p ? p.id : null;
          }).filter(Boolean);
          if(area.id) assignments[area.id] = pids;
        }
        const month = new Date().toISOString().slice(0,7);
        const draft = { month, assignments, notes:[], status:'confirmed' };
        await createDraftDB(draft);
        state.draft = draft;
        render();
        toast('배정표를 저장했어요.');
      };

      // 인원만 추가
      document.getElementById('extractPeopleFromScheduleBtn').onclick = async ()=>{
        const btn = document.getElementById('extractPeopleFromScheduleBtn');
        btn.disabled = true; btn.textContent = '추가 중...';
        const allNames = [...new Set(rows.flatMap(r=>[...(r.assignees||[]), r.inspector||''].filter(n=>n && n.length>=2)))];
        let added = 0;
        for(const name of allNames){
          if(!state.people.find(p=>p.name===name)){
            const person = {name, gender:'m', category:'normal', team:'', level:1, mentorId:null, age:null};
            await addPersonDB(person); state.people.push(person); added++;
          }
        }
        btn.textContent = `✓ ${added}명 추가 완료`;
        toast(`${added}명을 추가했어요.`);
        render();
      };
      return;
    }

    // ── 명렬표(인원 목록) 형식 ─────────────────────────────────
    const areas = Array.isArray(data.areas) ? data.areas.filter(a=>a.name) : [];
    const newAreas = areas.filter(a=>!state.areas.some(x=>x.name===a.name));
    const dupAreas = areas.filter(a=>state.areas.some(x=>x.name===a.name));

    // 인원 (성별·카테고리 포함)
    let people = Array.isArray(data.people) && data.people.length>0
      ? data.people
      : (Array.isArray(data.names) ? data.names.map(n=>({name:n,gender:'m',category:'normal'})) : []);
    people = people.filter(p=>p.name && p.name.trim().length>=2);
    const seen = new Set();
    const newPeople = people.filter(p=>{
      const name = p.name.trim();
      if(seen.has(name)) return false;
      seen.add(name);
      return !state.people.some(x=>x.name===name);
    });
    const dupPeople = people.filter(p=>state.people.some(x=>x.name===p.name.trim())).map(p=>p.name.trim());

    if(areas.length===0 && people.length===0){
      statusEl.textContent = '인식하지 못했어요. 다시 시도해주세요.';
      return;
    }

    let statusParts = ['<strong>분석 완료!</strong>'];
    if(dupAreas.length>0) statusParts.push(`🔁 중복 구역: ${dupAreas.map(a=>a.name).join(', ')}`);
    if(dupPeople.length>0) statusParts.push(`🔁 중복 인원: ${dupPeople.join(', ')}`);
    statusEl.innerHTML = statusParts.join('<br>');

    if(!previewEl) return;

    // 구역 미리보기
    const areasHtml = newAreas.length>0 ? `
      <div class="card">
        <h2>추출된 구역 (${newAreas.length}개)</h2>
        <p class="desc">난이도는 기본값 1이에요. 추가 후 구역 관리에서 수정해주세요.</p>
        <table><thead><tr><th>구역명</th><th>필요 인원</th></tr></thead><tbody>
          ${newAreas.map(a=>`<tr><td>${a.name}</td><td>${a.capacity||1}명</td></tr>`).join('')}
        </tbody></table>
        <button class="btn" id="addAreasBtn" style="margin-top:14px;">구역 ${newAreas.length}개 추가하기</button>
      </div>` : '';

    // 인원 미리보기
    const peopleHtml = newPeople.length>0 ? `
      <div class="card">
        <h2>추출된 인원 (${newPeople.length}명)</h2>
        <p class="desc">성별·카테고리가 자동 인식돼요. 추가 후 수정 가능해요.</p>
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;">
          ${newPeople.map(p=>`<span class="chip">
            <span class="tag ${p.gender==='f'?'f':'m'}" style="font-size:10px;">${p.gender==='f'?'여':'남'}</span>
            <span class="tag ${p.category||'normal'}" style="font-size:10px;">${catLabel(p.category||'normal')}</span>
            ${p.name.trim()}
          </span>`).join('')}
        </div>
        <button class="btn" id="addPeopleBtn">인원 ${newPeople.length}명 추가하기</button>
      </div>` : '';

    const cancelImportBtn = `<button class="btn ghost small" id="cancelImportBtn" style="margin-bottom:8px;">✕ 취소하기</button>`;
    previewEl.innerHTML = cancelImportBtn + areasHtml + peopleHtml;
    document.getElementById('cancelImportBtn').onclick = ()=>{
      previewEl.innerHTML='';
      statusEl.textContent='';
    };

    // 구역 추가
    const addAreasBtn = document.getElementById('addAreasBtn');
    if(addAreasBtn){
      addAreasBtn.onclick = async()=>{
        addAreasBtn.disabled=true; addAreasBtn.textContent='추가 중...';
        for(const a of newAreas){
          const area = {name:a.name, capacity:a.capacity||1, difficulty:1};
          await addAreaDB(area); state.areas.push(area);
        }
        addAreasBtn.textContent=`✓ ${newAreas.length}개 추가 완료`;
        toast(`구역 ${newAreas.length}개를 추가했어요.`);
      };
    }

    // 인원 추가
    const addPeopleBtn = document.getElementById('addPeopleBtn');
    if(addPeopleBtn){
      addPeopleBtn.onclick = async()=>{
        addPeopleBtn.disabled=true; addPeopleBtn.textContent='추가 중...';
        for(const p of newPeople){
          const person = {
            name: p.name.trim(),
            gender: p.gender==='f'?'f':'m',
            category: ['worker','mentor','mentee','normal'].includes(p.category)?p.category:'normal',
            team:'', level:1, mentorId:null, age:null
          };
          await addPersonDB(person); state.people.push(person);
        }
        addPeopleBtn.textContent=`✓ ${newPeople.length}명 추가 완료`;
        toast(`인원 ${newPeople.length}명을 추가했어요.`);
        render();
      };
    }
  }catch(e){
    statusEl.textContent='분석 중 문제가 발생했어요. 다시 시도해주세요.';
  }
}

loadAll();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
