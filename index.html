<script>
const SUPABASE_URL = 'https://pvuriqyiyghjuprewkwj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB2dXJpcXlpeWdoanVwcmV3a3dqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQzMTE1NzQsImV4cCI6MjA5OTg4NzU3NH0.Rr4YX-OcacHSsgn-dSmuW7pvSGuDouWfPVV1_p8KAb4';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const state = {
  people: [],
  areas: [],
  history: [],
  draft: null,
  tab: 'people',
  loaded: false,
  _selectedPeople: new Set(),
  _editingPersonId: null,
  _peopleFilter: 'all',
  _sections: JSON.parse(localStorage.getItem('people_sections') || '["상황실","중고등","초등"]')
};
function saveSections(){ localStorage.setItem('people_sections', JSON.stringify(state._sections)); }

function dbPersonToState(p){
  return { id:p.id, name:p.name, gender:p.gender, category:p.category, team:p.team||'', level:p.level, mentorId:p.mentor_id, age:p.age||null };
}
function dbAreaToState(a){
  return { id:a.id, name:a.name, capacity:a.capacity, difficulty:a.difficulty };
}
function dbScheduleToState(s){
  return { id:s.id, month:s.month, assignments:s.assignments||{}, status:s.status, notes:s.notes||[], createdAt: new Date(s.created_at).getTime() };
}

async function loadAll(){
  try{
    const [{data:people}, {data:areas}, {data:schedules}] = await Promise.all([
      sb.from('people').select('*').order('created_at', {ascending:true}),
      sb.from('areas').select('*').order('created_at', {ascending:true}),
      sb.from('schedules').select('*').order('created_at', {ascending:true})
    ]);
    state.people = (people||[]).map(dbPersonToState);
    state.areas = (areas||[]).map(dbAreaToState);
    const allSchedules = (schedules||[]).map(dbScheduleToState);
    state.history = allSchedules.filter(s=>s.status==='confirmed');
    const draft = allSchedules.find(s=>s.status==='draft');
    state.draft = draft || null;
  }catch(e){
    toast('Supabase 연결에 문제가 있어요.');
  }
  state.loaded = true;
  render();
}

async function addPersonDB(p){
  const {data, error} = await sb.from('people').insert({
    name:p.name, gender:p.gender, category:p.category, team:p.team, level:p.level, mentor_id:p.mentorId, age:p.age||null
  }).select().single();
  if(!error && data) p.id = data.id;
}
async function deletePersonDB(id){ await sb.from('people').delete().eq('id', id); }
async function clearMentorRefDB(mentorId){ await sb.from('people').update({mentor_id:null}).eq('mentor_id', mentorId); }
async function updatePersonDB(p){
  await sb.from('people').update({ name:p.name, gender:p.gender, category:p.category, team:p.team, level:p.level, mentor_id:p.mentorId||null, age:p.age||null }).eq('id', p.id);
}

async function addAreaDB(a){
  const {data, error} = await sb.from('areas').insert({ name:a.name, capacity:a.capacity, difficulty:a.difficulty }).select().single();
  if(!error && data) a.id = data.id;
}
async function deleteAreaDB(id){ await sb.from('areas').delete().eq('id', id); }
async function updateAreaDB(a){ await sb.from('areas').update({name:a.name,capacity:a.capacity,difficulty:a.difficulty}).eq('id',a.id); }

async function createDraftDB(draft){
  const {data, error} = await sb.from('schedules').insert({
    month:draft.month, assignments:draft.assignments, status:'draft', notes:draft.notes
  }).select().single();
  if(!error && data) draft.id = data.id;
}
async function updateDraftDB(){
  if(!state.draft) return;
  await sb.from('schedules').update({ assignments:state.draft.assignments, notes:state.draft.notes }).eq('id', state.draft.id);
}
async function confirmDraftDB(){
  await sb.from('schedules').update({ status:'confirmed' }).eq('id', state.draft.id);
}
async function deleteDraftDB(id){ await sb.from('schedules').delete().eq('id', id); }

function uid(){ return Math.random().toString(36).slice(2,9); }
function toast(msg, undoFn=null){
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const t = document.createElement('div');
  t.className='toast';
  const span = document.createElement('span');
  span.textContent = msg;
  t.appendChild(span);
  let timer;
  if(undoFn){
    const btn = document.createElement('button');
    btn.className='toast-undo'; btn.textContent='되돌리기';
    btn.onclick = ()=>{ clearTimeout(timer); t.remove(); undoFn(); };
    t.appendChild(btn);
    timer = setTimeout(()=>t.remove(), 5000);
  } else {
    timer = setTimeout(()=>t.remove(), 2200);
  }
  document.body.appendChild(t);
}

function personById(id){ return state.people.find(p=>p.id===id); }
function areaById(id){ return state.areas.find(a=>a.id===id); }

function catLabel(c){ return c==='mentor'?'멘토':c==='mentee'?'멘티':c==='worker'?'사역자':'일반'; }
function genderLabel(g){ return g==='m'?'남':'여'; }

// ---------- rendering ----------
function render(){
  const root = document.getElementById('root');
  if(!state.loaded){ root.innerHTML = '<div class="empty">불러오는 중...</div>'; return; }
  root.innerHTML = `
    <div class="hero">
      <img src="./images/원본/IMG_7110.JPG" alt="청소 당번표">
      <div class="hero-text">
        <div class="brand">청소 당번표 관리</div>
        <div class="sub">인원과 구역을 등록하면 조건에 맞춰 매달 배정표를 자동으로 만들어드려요.</div>
      </div>
    </div>
    <div class="app-inner">
    <nav>
      ${tabBtn('people','인원 관리')}
      ${tabBtn('areas','구역 관리')}
      ${tabBtn('generate','이번 달 배정')}
      ${tabBtn('history','이력')}
    </nav>
    <div id="tabBody"></div>
    </div>
  `;
  const body = document.getElementById('tabBody');
  if(state.tab==='people') body.innerHTML = renderPeopleTab();
  if(state.tab==='areas') body.innerHTML = renderAreasTab();
  if(state.tab==='generate') body.innerHTML = renderGenerateTab();
  if(state.tab==='history') body.innerHTML = renderHistoryTab();
  bindEvents();
}
function tabBtn(id,label){
  return `<button class="${state.tab===id?'active':''}" data-tab="${id}">${label}</button>`;
}
function setTab(id){ state.tab = id; render(); }



// ---------- people tab ----------
function catOptions(selected){
  return ['normal','mentor','mentee','worker'].map(v=>`<option value="${v}" ${selected===v?'selected':''}>${catLabel(v)}</option>`).join('');
}

function renderPersonRow(p, isMentee){
  const sel = state._selectedPeople.has(p.id);
  const mentors = state.people.filter(x=>x.category==='mentor');
  const rowClass = `prow ${isMentee?'mentee-row':p.category==='mentor'?'mentor-row':p.category==='worker'?'worker-row':''} ${sel?'selected':''}`;
  const mentorSel = `<select data-inline-mentor="${p.id}" style="font-size:12px;padding:3px 5px;border:1px solid var(--line);border-radius:5px;background:#fdfcf8;">
    <option value="">-</option>
    ${mentors.filter(m=>m.id!==p.id).map(m=>`<option value="${m.id}" ${p.mentorId===m.id?'selected':''}>${m.name}</option>`).join('')}
  </select>`;
  return `<div class="${rowClass}" data-pid="${p.id}" style="grid-template-columns:28px 1fr auto auto auto auto auto auto auto;">

// ---------- assignment algorithm ----------
function currentMonthLabel(){
  const now = new Date();
  return `${now.getFullYear()}년 ${now.getMonth()+1}월`;
}

function buildUnits(){
  const mentees = state.people.filter(p=>p.category==='mentee');
  const mentors = state.people.filter(p=>p.category==='mentor');
  const used = new Set();
  const units = [];
  mentors.forEach(m=>{
    const myMentees = mentees.filter(me=>me.mentorId===m.id);
    const members = [m, ...myMentees];
    members.forEach(mm=>used.add(mm.id));
    units.push({
      id: uid(),
      members,
      gender: m.gender,
      level: Math.max(...members.map(x=>x.level)),
      teams: [...new Set(members.map(x=>x.team||''))]
    });
  });
  state.people.forEach(p=>{
    if(used.has(p.id)) return;
    units.push({ id: uid(), members:[p], gender:p.gender, level:p.level, teams:[p.team||''] });
  });
  return units;
}

function lastAreaMap(){
  const confirmed = state.history.filter(h=>h.status==='confirmed');
  if(confirmed.length===0) return {};
  const last = confirmed[confirmed.length-1];
  const map = {};
  Object.entries(last.assignments).forEach(([areaId, pids])=>{
    pids.forEach(pid=> map[pid]=areaId);
  });
  return map;
}

function assignCounts(){
  const counts = {};
  state.people.forEach(p=>counts[p.id]=0);
  state.history.forEach(h=>{
    Object.values(h.assignments).flat().forEach(pid=>{ if(counts[pid]!==undefined) counts[pid]++; });
  });
  return counts;
}

function generateDraft(){
  const notes = [];
  const units = buildUnits();
  const lastMap = lastAreaMap();
  const counts = assignCounts();
  const unitScore = (u)=> u.members.reduce((s,m)=>s+ (counts[m.id]||0), 0) / u.members.length;

  const areasSorted = [...state.areas].sort((a,b)=>b.difficulty-a.difficulty);
  const assignments = {};
  state.areas.forEach(a=> assignments[a.id]=[]);

  let remainingUnits = [...units];

  areasSorted.forEach(area=>{
    let filled = 0;
    let areaGender = null;
    // sort candidates by fairness score (least assigned first)
    remainingUnits.sort((a,b)=>unitScore(a)-unitScore(b));
    let i=0;
    while(filled < area.capacity && i < remainingUnits.length){
      const u = remainingUnits[i];
      const size = u.members.length;
      if(filled + size > area.capacity){ i++; continue; }
      const levelOk = u.level <= area.difficulty || area.difficulty<=1 ? true : u.members.every(m=>m.level>=area.difficulty);
      const genderOk = areaGender===null || u.gender===areaGender;
      const noRepeat = u.members.every(m=> lastMap[m.id] !== area.id);
      if(levelOk && genderOk && noRepeat){
        assignments[area.id].push(...u.members.map(m=>m.id));
        filled += size;
        areaGender = u.gender;
        remainingUnits.splice(i,1);
      } else {
        i++;
      }
    }
    if(filled < area.capacity){
      // relax repeat rule first
      i=0;
      while(filled < area.capacity && i < remainingUnits.length){
        const u = remainingUnits[i];
        const size = u.members.length;
        if(filled + size > area.capacity){ i++; continue; }
        const genderOk = areaGender===null || u.gender===areaGender;
        if(genderOk){
          assignments[area.id].push(...u.members.map(m=>m.id));
          filled += size;
          areaGender = u.gender;
          remainingUnits.splice(i,1);
          notes.push(`"${area.name}" 배정 시 연속 배정 금지 조건을 완화했어요. 확인해주세요.`);
        } else { i++; }
      }
    }
    if(filled < area.capacity){
      notes.push(`"${area.name}"에 인원이 부족해요 (${filled}/${area.capacity}명). 직접 채워주세요.`);
    }
  });

  if(remainingUnits.length>0){
    notes.push(`미배정 인원이 있어요. 구역별 정원을 확인하거나 직접 배정해주세요.`);
  }

  return {
    id: uid(),
    month: currentMonthLabel(),
    assignments,
    status: 'draft',
    notes,
    createdAt: Date.now()
  };
}

// ---------- events ----------
function bindEvents(){
  document.querySelectorAll('[data-tab]').forEach(b=>{
    b.onclick = ()=> setTab(b.dataset.tab);
  });


  // people tab
  const addPersonBtn = document.getElementById('addPersonBtn');
  if(addPersonBtn){
    const catSel = document.getElementById('p_category');
    const mentorWrap = document.getElementById('mentorPickWrap');
    catSel.onchange = ()=>{ mentorWrap.style.display = catSel.value==='mentee' ? 'flex' : 'none'; };
    const cancelPersonBtn = document.getElementById('cancelPersonBtn');
    const pNameInput = document.getElementById('p_name');
    const showCancelBtn = ()=>{ cancelPersonBtn.style.display = pNameInput.value.trim() ? '' : 'none'; };
    pNameInput.addEventListener('input', showCancelBtn);
    cancelPersonBtn.onclick = ()=>{
      pNameInput.value='';
      document.getElementById('p_team').value='';
      document.getElementById('p_level').value='1';
      document.getElementById('p_age').value='';
      document.getElementById('p_gender').value='m';
      document.getElementById('p_category').value='normal';
      if(document.getElementById('p_mentor')) document.getElementById('p_mentor').value='';
      document.getElementById('mentorPickWrap').style.display='none';
      cancelPersonBtn.style.display='none';
    };
    addPersonBtn.onclick = async ()=>{
      const name = pNameInput.value.trim();
      if(!name){ toast('이름을 입력해주세요.'); return; }
      const gender = document.getElementById('p_gender').value;
      const category = document.getElementById('p_category').value;
      const team = document.getElementById('p_team').value.trim();
      const level = parseInt(document.getElementById('p_level').value)||1;
      const mentorId = category==='mentee' ? (document.getElementById('p_mentor').value || null) : null;
      const ageVal = document.getElementById('p_age').value;
      const age = ageVal ? parseInt(ageVal) : null;
      const person = { name, gender, category, team, level, mentorId, age };
      await addPersonDB(person);
      state.people.push(person);
      pNameInput.value=''; cancelPersonBtn.style.display='none';
      render();
      toast('인원을 추가했어요.', async ()=>{
        await deletePersonDB(person.id);
        state.people = state.people.filter(p=>p.id!==person.id);
        render();
        toast(`${person.name} 추가를 취소했어요.`);
      });
    };

    // 체크박스 - 개별
    document.querySelectorAll('.p-check').forEach(chk=>{
      chk.onclick = (e)=>{
        e.stopPropagation();
        const id = chk.dataset.id;
        if(chk.checked) state._selectedPeople.add(id);
        else state._selectedPeople.delete(id);
        render();
      };
    });
    // 누끼 전체 선택 버튼
    // 카테고리 필터 탭
    document.querySelectorAll('.filter-tab').forEach(btn=>{
      btn.onclick = ()=>{ state._peopleFilter = btn.dataset.f; render(); };
    });

    // 섹션 삭제
    document.querySelectorAll('.section-chip-del').forEach(btn=>{
      btn.onclick = ()=>{
        const s = btn.dataset.delSection;
        if(!confirm(`"${s}" 섹션을 삭제할까요?\n(인원의 팀 정보는 유지되며 기타 섹션으로 이동해요)`)) return;
        state._sections = state._sections.filter(x=>x!==s);
        saveSections();
        if(state._peopleFilter===s) state._peopleFilter='all';
        render();
      };
    });

    // 섹션 추가
    const sectionAddBtn = document.getElementById('sectionAddBtn');
    const sectionAddForm = document.getElementById('sectionAddForm');
    const sectionNameInput = document.getElementById('sectionNameInput');
    if(sectionAddBtn) sectionAddBtn.onclick = ()=>{
      sectionAddForm.style.display='flex';
      sectionNameInput.focus();
    };
    const confirmAdd = ()=>{
      const name = sectionNameInput.value.trim();
      if(!name) return;
      if(state._sections.includes(name)){ toast('이미 있는 섹션이에요.'); return; }
      state._sections.push(name);
      saveSections();
      render();
    };
    document.getElementById('sectionConfirmBtn').onclick = confirmAdd;
    document.getElementById('sectionCancelBtn').onclick = ()=>{ sectionAddForm.style.display='none'; };
    sectionNameInput.onkeydown = (e)=>{ if(e.key==='Enter') confirmAdd(); if(e.key==='Escape') sectionAddForm.style.display='none'; };

    const nukkiFab = document.getElementById('nukkiFab');
    if(nukkiFab) nukkiFab.onclick = ()=>{
      const allChecked = state.people.every(p=>state._selectedPeople.has(p.id));
      if(allChecked) state._selectedPeople.clear();
      else state.people.forEach(p=>state._selectedPeople.add(p.id));
      render();
    };

    // 인라인 토글 수정 (성별, 카테고리, 팀, 레벨)
    document.querySelectorAll('.editable-cell').forEach(cell=>{
      cell.onclick = (e)=>{
        e.stopPropagation();
        const type = cell.dataset.toggle;
        const id = cell.dataset.id;
        const p = state.people.find(x=>x.id===id);
        if(!p) return;
        // 기존 팝업 제거
        document.querySelectorAll('.inline-pop').forEach(el=>el.remove());
        const pop = document.createElement('div');
        pop.className = 'inline-pop';
        pop.style.cssText = 'position:absolute;z-index:20;background:#fff;border:1px solid var(--moss);border-radius:8px;padding:8px 10px;box-shadow:0 3px 12px rgba(0,0,0,0.15);min-width:120px;';
        if(type==='gender'){
          pop.innerHTML = `<div style="font-size:11px;color:var(--muted);margin-bottom:4px;">성별</div>
            <div style="display:flex;gap:6px;">
              <button class="btn small ${p.gender==='m'?'':'ghost'}" data-val="m">남</button>
              <button class="btn small ${p.gender==='f'?'':'ghost'}" data-val="f">여</button>
            </div>`;
          pop.querySelectorAll('button').forEach(b=>b.onclick=async()=>{
            p.gender=b.dataset.val; await updatePersonDB(p); pop.remove(); render();
          });
        } else if(type==='category'){
          pop.innerHTML = `<div style="font-size:11px;color:var(--muted);margin-bottom:4px;">카테고리</div>
            <div style="display:flex;flex-direction:column;gap:4px;">
              ${['normal','mentor','mentee','worker'].map(v=>`<button class="btn small ${p.category===v?'':'ghost'}" data-val="${v}">${catLabel(v)}</button>`).join('')}
            </div>`;
          pop.querySelectorAll('button').forEach(b=>b.onclick=async()=>{
            p.category=b.dataset.val; await updatePersonDB(p); pop.remove(); render();
          });
        } else if(type==='team'){
          pop.innerHTML = `<div style="font-size:11px;color:var(--muted);margin-bottom:4px;">팀</div>
            <input type="text" value="${p.team||''}" placeholder="팀명" style="width:100px;font-size:13px;padding:5px 7px;border:1px solid var(--line);border-radius:5px;">
            <button class="btn small" style="margin-top:6px;width:100%;">저장</button>`;
          const inp = pop.querySelector('input');
          pop.querySelector('button').onclick = async()=>{
            p.team=inp.value.trim(); await updatePersonDB(p); pop.remove(); render();
          };
          setTimeout(()=>inp.focus(),50);
        } else if(type==='level'){
          pop.innerHTML = `<div style="font-size:11px;color:var(--muted);margin-bottom:4px;">레벨</div>
            <div style="display:flex;gap:4px;">
              ${[1,2,3,4,5].map(n=>`<button class="btn small ${p.level===n?'':'ghost'}" data-val="${n}">${n}</button>`).join('')}
            </div>`;
          pop.querySelectorAll('button').forEach(b=>b.onclick=async()=>{
            p.level=parseInt(b.dataset.val); await updatePersonDB(p); pop.remove(); render();
          });
        } else if(type==='age'){
          pop.innerHTML = `<div style="font-size:11px;color:var(--muted);margin-bottom:4px;">나이</div>
            <input type="number" value="${p.age||''}" placeholder="나이" min="1" max="120" style="width:80px;font-size:13px;padding:5px 7px;border:1px solid var(--line);border-radius:5px;">
            <button class="btn small" style="margin-top:6px;width:100%;">저장</button>`;
          const inp = pop.querySelector('input');
          pop.querySelector('button').onclick = async()=>{
            p.age = inp.value ? parseInt(inp.value) : null; await updatePersonDB(p); pop.remove(); render();
          };
          setTimeout(()=>inp.focus(),50);
        }
        cell.style.position='relative';
        cell.appendChild(pop);
        const close = (ev)=>{ if(!pop.contains(ev.target)&&ev.target!==cell){ pop.remove(); document.removeEventListener('click',close); }};
        setTimeout(()=>document.addEventListener('click',close),100);
      };
    });

    // 담당 멘토 인라인 select
    document.querySelectorAll('[data-inline-mentor]').forEach(sel=>{
      sel.onchange = async()=>{
        const p = state.people.find(x=>x.id===sel.dataset.inlineMentor);
        if(!p) return;
        p.mentorId = sel.value || null;
        await updatePersonDB(p);
        render();
        toast('멘토를 변경했어요.');
      };
    });

    // 삭제
    document.querySelectorAll('[data-del-person]').forEach(b=>{
      b.onclick = async (e)=>{
        e.stopPropagation();
        const rawId = b.dataset.delPerson;
        const id = isNaN(rawId) ? rawId : Number(rawId);
        const deleted = state.people.find(p=>p.id==rawId);
        await deletePersonDB(id);
        await clearMentorRefDB(id);
        state.people = state.people.filter(p=>p.id!=rawId);
        state.people.forEach(p=>{ if(p.mentorId==rawId) p.mentorId=null; });
        state._selectedPeople.forEach(sid=>{ if(String(sid)===rawId) state._selectedPeople.delete(sid); });
        render();
        if(deleted) toast(`${deleted.name}을(를) 삭제했어요.`, async ()=>{
          const restored = {...deleted, id:undefined};
          await addPersonDB(restored);
          state.people.push(restored);
          render();
          toast(`${deleted.name}을(를) 복원했어요.`);
        });
      };
    });

    // 일괄 수정
    const bulkApplyBtn = document.getElementById('bulkApplyBtn');
    if(bulkApplyBtn){
      bulkApplyBtn.onclick = async()=>{
        const gender = document.getElementById('bulk_gender').value;
        const category = document.getElementById('bulk_category').value;
        const team = document.getElementById('bulk_team').value.trim();
        const levelRaw = document.getElementById('bulk_level').value;
        const level = levelRaw ? parseInt(levelRaw) : null;
        const ageRaw = document.getElementById('bulk_age').value;
        const age = ageRaw ? parseInt(ageRaw) : null;
        const targets = state.people.filter(p=>state._selectedPeople.has(p.id));
        for(const p of targets){
          if(gender) p.gender=gender;
          if(category) p.category=category;
          if(team) p.team=team;
          if(level) p.level=level;
          if(age) p.age=age;
          await updatePersonDB(p);
        }
        state._selectedPeople.clear();
        render();
        toast(`${targets.length}명을 수정했어요.`);
      };
      document.getElementById('bulkCancelBtn').onclick=()=>{ state._selectedPeople.clear(); render(); };
      document.getElementById('bulkDeleteBtn').onclick = async()=>{
        const targets = state.people.filter(p=>state._selectedPeople.has(p.id));
        if(!confirm(`선택한 ${targets.length}명을 삭제할까요?`)) return;
        const snapshot = targets.map(p=>({...p}));
        for(const p of targets){
          await sb.from('people').delete().eq('id',p.id);
          state.people = state.people.filter(x=>x.id!==p.id);
        }
        state._selectedPeople.clear();
        render();
        toast(`${targets.length}명을 삭제했어요.`, async ()=>{
          for(const p of snapshot){
            const restored = {...p, id:undefined};
            await addPersonDB(restored);
            state.people.push(restored);
          }
          render();
          toast(`${snapshot.length}명을 복원했어요.`);
        });
      };
    }

    const uploadBox = document.getElementById('uploadBox');
    const fileInput = document.getElementById('fileInput');
    uploadBox.onclick = ()=> fileInput.click();
    uploadBox.ondragover = (e)=>{ e.preventDefault(); uploadBox.style.borderColor='var(--moss)'; };
    uploadBox.ondrop = (e)=>{ e.preventDefault(); if(e.dataTransfer.files[0]) handleRosterImage(e.dataTransfer.files[0]); };
    fileInput.onchange = ()=>{ if(fileInput.files[0]) handleRosterImage(fileInput.files[0]); };
  }

  // areas tab
  const addAreaBtn = document.getElementById('addAreaBtn');
  if(addAreaBtn){
    addAreaBtn.onclick = async ()=>{
      const name = document.getElementById('a_name').value.trim();
      if(!name){ toast('구역명을 입력해주세요.'); return; }
      const capacity = parseInt(document.getElementById('a_capacity').value)||1;
      const difficulty = parseInt(document.getElementById('a_difficulty').value)||1;
      const area = { name, capacity, difficulty };
      await addAreaDB(area);
      state.areas.push(area);
      render();
      toast('구역을 추가했어요.');
    };
    document.querySelectorAll('[data-del-area]').forEach(b=>{
      b.onclick = async ()=>{
        await deleteAreaDB(b.dataset.delArea);
        state.areas = state.areas.filter(a=>a.id!==b.dataset.delArea);
        render();
      };
    });

    // 구역 인라인 편집 (필요 인원 / 난이도)
    document.querySelectorAll('.area-inline').forEach(input=>{
      input.onchange = async ()=>{
        const id = input.dataset.areaId;
        const field = input.dataset.areaField;
        const val = parseInt(input.value);
        if(isNaN(val)||val<1) return;
        const area = state.areas.find(a=>String(a.id)===String(id));
        if(!area) return;
        area[field] = val;
        await updateAreaDB(area);
        toast(`${area.name} ${field==='difficulty'?'난이도':'필요 인원'}을 ${val}로 변경했어요.`);
      };
    });
  }

  // generate tab
  const genBtn = document.getElementById('genDraftBtn');
  if(genBtn){
    genBtn.onclick = async ()=>{
      const draft = generateDraft();
      await createDraftDB(draft);
      state.draft = draft;
      render();
    };
  }
  const regenBtn = document.getElementById('regenBtn');
  if(regenBtn){
    regenBtn.onclick = async ()=>{
      await deleteDraftDB(state.draft.id);
      const draft = generateDraft();
      await createDraftDB(draft);
      state.draft = draft;
      render();
    };
  }
  const confirmBtn = document.getElementById('confirmBtn');
  if(confirmBtn){
    confirmBtn.onclick = async ()=>{
      await confirmDraftDB();
      state.draft.status='confirmed';
      state.history.push(state.draft);
      state.draft = null;
      render();
      toast('이번 달 배정표를 확정했어요.');
    };
  }
  document.querySelectorAll('[data-remove-assign]').forEach(b=>{
    b.onclick = async ()=>{
      const [areaId, pid] = b.dataset.removeAssign.split('|');
      state.draft.assignments[areaId] = state.draft.assignments[areaId].filter(id=>id!==pid);
      await updateDraftDB();
      render();
    };
  });
  document.querySelectorAll('[data-add-to]').forEach(sel=>{
    sel.onchange = async ()=>{
      const areaId = sel.dataset.addTo;
      const pid = sel.value;
      if(!pid) return;
      state.draft.assignments[areaId].push(pid);
      await updateDraftDB();
      render();
    };
  });
  const exportBtn = document.getElementById('exportImgBtn');
  if(exportBtn){
    exportBtn.onclick = ()=> exportBoardImage();
  }

  // history tab
  document.querySelectorAll('[data-view-history]').forEach(item=>{
    item.onclick = ()=>{
      const h = state.history.find(x=>x.id===item.dataset.viewHistory);
      document.getElementById('historyDetail').innerHTML = renderDraftBoard(h, false);
      bindEvents();
      document.getElementById('historyDetail').scrollIntoView({behavior:'smooth'});
    };
  });
}

function exportBoardImage(){
  const el = document.getElementById('captureArea');
  toast('이미지 생성 중...');
  html2canvas(el, { backgroundColor:'#fffefb', scale:2 }).then(canvas=>{
    const link = document.createElement('a');
    link.download = `청소당번표_${(state.draft?state.draft.month:'').replace(/\s/g,'')}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  });
}

// ---------- 통합 이미지 분석 (구역 + 인원 동시 추출) ----------
async function handleRosterImage(file){
  const statusEl = document.getElementById('uploadStatus');
  const previewEl = document.getElementById('importPreview');
  statusEl.textContent = '이미지를 분석하는 중...';
  if(previewEl) previewEl.innerHTML = '';
  try{
    const base64 = await new Promise((res,rej)=>{
      const r = new FileReader();
      r.onload = ()=> res(r.result.split(',')[1]);
      r.onerror = rej;
      r.readAsDataURL(file);
    });
    const mediaType = file.type || 'image/png';
    const response = await fetch('https://pvuriqyiyghjuprewkwj.supabase.co/functions/v1/analyze-image', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ base64, mediaType, mode:'schedule' })
    });
    const data = await response.json();

    // 구역
    const areas = Array.isArray(data.areas) ? data.areas.filter(a=>a.name) : [];
    const newAreas = areas.filter(a=>!state.areas.some(x=>x.name===a.name));
    const dupAreas = areas.filter(a=>state.areas.some(x=>x.name===a.name));

    // 인원 (성별·카테고리 포함)
    let people = Array.isArray(data.people) && data.people.length>0
      ? data.people
      : (Array.isArray(data.names) ? data.names.map(n=>({name:n,gender:'m',category:'normal'})) : []);
    people = people.filter(p=>p.name && p.name.trim().length>=2);
    const seen = new Set();
    const newPeople = people.filter(p=>{
      const name = p.name.trim();
      if(seen.has(name)) return false;
      seen.add(name);
      return !state.people.some(x=>x.name===name);
    });
    const dupPeople = people.filter(p=>state.people.some(x=>x.name===p.name.trim())).map(p=>p.name.trim());

    if(areas.length===0 && people.length===0){
      statusEl.textContent = '인식하지 못했어요. 다시 시도해주세요.';
      return;
    }

    let statusParts = ['<strong>분석 완료!</strong>'];
    if(dupAreas.length>0) statusParts.push(`🔁 중복 구역: ${dupAreas.map(a=>a.name).join(', ')}`);
    if(dupPeople.length>0) statusParts.push(`🔁 중복 인원: ${dupPeople.join(', ')}`);
    statusEl.innerHTML = statusParts.join('<br>');

    if(!previewEl) return;

    // 구역 미리보기
    const areasHtml = newAreas.length>0 ? `
      <div class="card">
        <h2>추출된 구역 (${newAreas.length}개)</h2>
        <p class="desc">난이도는 기본값 1이에요. 추가 후 구역 관리에서 수정해주세요.</p>
        <table><thead><tr><th>구역명</th><th>필요 인원</th></tr></thead><tbody>
          ${newAreas.map(a=>`<tr><td>${a.name}</td><td>${a.capacity||1}명</td></tr>`).join('')}
        </tbody></table>
        <button class="btn" id="addAreasBtn" style="margin-top:14px;">구역 ${newAreas.length}개 추가하기</button>
      </div>` : '';

    // 인원 미리보기
    const peopleHtml = newPeople.length>0 ? `
      <div class="card">
        <h2>추출된 인원 (${newPeople.length}명)</h2>
        <p class="desc">성별·카테고리가 자동 인식돼요. 추가 후 수정 가능해요.</p>
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;">
          ${newPeople.map(p=>`<span class="chip">
            <span class="tag ${p.gender==='f'?'f':'m'}" style="font-size:10px;">${p.gender==='f'?'여':'남'}</span>
            <span class="tag ${p.category||'normal'}" style="font-size:10px;">${catLabel(p.category||'normal')}</span>
            ${p.name.trim()}
          </span>`).join('')}
        </div>
        <button class="btn" id="addPeopleBtn">인원 ${newPeople.length}명 추가하기</button>
      </div>` : '';

    const cancelImportBtn = `<button class="btn ghost small" id="cancelImportBtn" style="margin-bottom:8px;">✕ 취소하기</button>`;
    previewEl.innerHTML = cancelImportBtn + areasHtml + peopleHtml;
    document.getElementById('cancelImportBtn').onclick = ()=>{
      previewEl.innerHTML='';
      statusEl.textContent='';
    };

    // 구역 추가
    const addAreasBtn = document.getElementById('addAreasBtn');
    if(addAreasBtn){
      addAreasBtn.onclick = async()=>{
        addAreasBtn.disabled=true; addAreasBtn.textContent='추가 중...';
        for(const a of newAreas){
          const area = {name:a.name, capacity:a.capacity||1, difficulty:1};
          await addAreaDB(area); state.areas.push(area);
        }
        addAreasBtn.textContent=`✓ ${newAreas.length}개 추가 완료`;
        toast(`구역 ${newAreas.length}개를 추가했어요.`);
      };
    }

    // 인원 추가
    const addPeopleBtn = document.getElementById('addPeopleBtn');
    if(addPeopleBtn){
      addPeopleBtn.onclick = async()=>{
        addPeopleBtn.disabled=true; addPeopleBtn.textContent='추가 중...';
        for(const p of newPeople){
          const person = {
            name: p.name.trim(),
            gender: p.gender==='f'?'f':'m',
            category: ['worker','mentor','mentee','normal'].includes(p.category)?p.category:'normal',
            team:'', level:1, mentorId:null, age:null
          };
          await addPersonDB(person); state.people.push(person);
        }
        addPeopleBtn.textContent=`✓ ${newPeople.length}명 추가 완료`;
        toast(`인원 ${newPeople.length}명을 추가했어요.`);
        render();
      };
    }
  }catch(e){
    statusEl.textContent='분석 중 문제가 발생했어요. 다시 시도해주세요.';
  }
}

  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
